<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>cumu</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/theme-standard.css">
  <link rel="stylesheet" href="/css/settings.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>&#127925;</text></svg>">
  <script>
    // Apply persisted theme before first paint to avoid flash of unstyled content
    (function() {
      const t = localStorage.getItem('cumu_theme');
      if (t === 'standard') document.documentElement.setAttribute('data-theme', 'standard');
    })();
  </script>
</head>
<body>
  <!-- Top Nav -->
  <header class="top-nav" id="topNav">
    <span class="wordmark-small">cumu</span>
    <div class="nav-right">
      <span id="navUser" class="mute caption"></span>
      <!-- Requirement #5: icon-only Settings/Admin buttons, themed differently per design -->
      <button class="btn-icon icon-only" id="settingsBtn" onclick="navigate('settings')" aria-label="Settings" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button class="btn-icon icon-only" id="adminBtn" style="display:none" onclick="navigate('admin')" aria-label="Admin dashboard" title="Admin dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6z"/><path d="M9 12l2 2 4-4"/></svg>
      </button>
      <button class="btn-secondary icon-only" onclick="logout()" aria-label="Log out" title="Log out">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main id="mainContent" class="main-content"></main>

  <!-- Now Playing Bar — clickable to open full now-playing view -->
  <div class="now-playing-bar" id="nowPlayingBar" style="display:none" role="region" aria-label="Now Playing">
    <div class="np-info" id="npInfo" style="cursor:pointer" onclick="navigate('nowplaying')" aria-label="Open now playing view"></div>
    <div class="np-controls" id="npControls" role="group" aria-label="Playback controls"></div>
    <div class="np-progress">
      <span id="npCurrentTime">0:00</span>
      <input type="range" id="npSeek" value="0" min="0" max="100" step="0.1" aria-label="Seek">
      <span id="npDuration">0:00</span>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <button class="nav-tab" data-page="home" onclick="navigate('home')" aria-label="Home">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      </span>
      <span>home</span>
    </button>
    <button class="nav-tab" data-page="search" onclick="navigate('search')" aria-label="Search">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <span>search</span>
    </button>
    <button class="nav-tab" data-page="library" onclick="navigate('library')" aria-label="Library">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="4" width="4" height="16" rx="1"/><rect x="10" y="4" width="4" height="16" rx="1"/><path d="M17 4l4 1.5v13L17 20z"/></svg>
      </span>
      <span>library</span>
    </button>
  </nav>

  <!-- Login Modal -->
  <div class="modal-overlay" id="loginModal" role="dialog" aria-modal="true" aria-label="Login">
    <div class="modal">
      <pre class="wordmark">cumu</pre>
      <form id="loginForm">
        <div class="form-row">
          <label for="loginUsername">username</label>
          <input type="text" id="loginUsername" name="username" required placeholder="username" autofocus />
        </div>
        <div class="form-row">
          <label for="loginPassword">password</label>
          <input type="password" id="loginPassword" name="password" required placeholder="password" />
        </div>
        <div id="loginError" class="error-msg" style="display:none" role="alert"></div>
        <button type="submit" class="btn-primary">login &rarr;</button>
      </form>
    </div>
  </div>

  <!-- Song Context Menu -->
  <div class="context-menu" id="contextMenu" style="display:none" role="menu"></div>

  <script src="/js/app.js"></script>
  <script src="/js/settings.js"></script>
</body>
</html>
